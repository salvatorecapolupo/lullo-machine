<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Ars Magna — Lullo Machine</title>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>

:root{
--green:#00ff88;
--greenSoft:#00aa55;
--bg:#000;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
color:var(--green);
font-family:monospace;
}

header{
text-align:center;
padding:20px;
border-bottom:1px solid var(--greenSoft);
}

header h1{
letter-spacing:0.25em;
font-size:22px;
}

header p{
color:var(--greenSoft);
font-size:12px;
margin-top:6px;
}

#portrait{
text-align:center;
padding:20px 0;
}

#portrait img{
width:120px;
filter:contrast(1.2) brightness(1.1);
}

#machine{
height:80vh;
display:flex;
align-items:center;
justify-content:center;
}

canvas{
width:100%;
height:100%;
touch-action:none;
}

#result{
text-align:center;
padding:30px 20px;
border-top:1px solid var(--greenSoft);
border-bottom:1px solid var(--greenSoft);
}

#letters{
letter-spacing:10px;
font-size:22px;
margin-bottom:10px;
}

#phrase{
font-size:42px;
font-weight:700;
max-width:900px;
margin:auto;
}

#math{
text-align:center;
padding:20px;
color:var(--greenSoft);
font-size:18px;
}

#help{
text-align:center;
padding:20px;
color:var(--greenSoft);
}

</style>

</head>

<body>

<header>

<h1>ARS MAGNA</h1>

<p>Raimundus Lullus · Ars Generalis Ultima</p>

</header>

<div id="portrait">
<img src="500px-Ramon_Llull.png" alt="Ramon Llull">
</div>

<section id="machine">
<canvas id="c"></canvas>
</section>

<section id="result">

<div id="letters">· · ·</div>

<h1 id="phrase">Trascina i dischi</h1>

</section>

<div id="math">

\[
9 \times 9 \times 9 = 9^3 = 729
\]

propositiones possibiles

</div>

<div id="help">
ruota i dischi per generare una proposizione
</div>


<script>

const canvas=document.getElementById("c")
const ctx=canvas.getContext("2d")

let W,CX,CY

const letters=["B","C","D","E","F","G","H","I","K"]

const dignita=[
"Bontà","Grandezza","Eternità","Potenza","Saggezza",
"Volontà","Virtù","Verità","Gloria"
]

const relazioni=[
"differisce da",
"concorda con",
"è contraria a",
"è principio di",
"è mezzo tra",
"è fine di",
"è maggiore di",
"è uguale a",
"è minore di"
]

const soggetti=[
"Dio","Angelo","Cielo","Uomo",
"Immaginativa","Sensitivo",
"Vegetativo","Elementale",
"Strumentale"
]

let ang=[0,0,0]

const rings=[0.46,0.33,0.20]

let dragging=null
let lastAngle=0


function resize(){

W=Math.min(window.innerWidth,window.innerHeight*0.85)

canvas.width=W
canvas.height=W

CX=W/2
CY=W/2

draw()

}

window.addEventListener("resize",resize)

resize()



function draw(){

ctx.clearRect(0,0,W,W)

for(let d=0;d<3;d++){

let r=W*rings[d]
let rin=r-W*0.11

const activeIndex=getIndex(ang[d])

if(d===dragging){
ctx.shadowColor="#00ff88"
ctx.shadowBlur=25
}

for(let i=0;i<9;i++){

let a0=ang[d]+i*(Math.PI*2/9)-Math.PI/2
let a1=a0+(Math.PI*2/9)
let am=(a0+a1)/2

ctx.beginPath()
ctx.arc(CX,CY,r,a0,a1)
ctx.arc(CX,CY,rin,a1,a0,true)
ctx.closePath()

ctx.strokeStyle="#00ff88"
ctx.stroke()

if(i===activeIndex){

ctx.fillStyle="rgba(0,255,120,0.25)"
ctx.fill()

}

let x=CX+Math.cos(am)*(r-(r-rin)/2)
let y=CY+Math.sin(am)*(r-(r-rin)/2)

ctx.fillStyle="#00ff88"
ctx.font=(W*0.04)+"px monospace"
ctx.textAlign="center"
ctx.textBaseline="middle"

ctx.fillText(letters[i],x,y)

}

ctx.shadowBlur=0

}

/* indicatore */

ctx.beginPath()
ctx.moveTo(CX,10)
ctx.lineTo(CX-15,40)
ctx.lineTo(CX+15,40)
ctx.closePath()

ctx.fillStyle="#00ff88"
ctx.fill()

/* centro */

ctx.beginPath()
ctx.arc(CX,CY,W*0.05,0,Math.PI*2)
ctx.strokeStyle="#00ff88"
ctx.stroke()

ctx.fillText("A",CX,CY)

}



function angle(x,y){
return Math.atan2(y-CY,x-CX)
}



canvas.addEventListener("pointerdown",e=>{

const rect=canvas.getBoundingClientRect()

let x=(e.clientX-rect.left)*(canvas.width/rect.width)
let y=(e.clientY-rect.top)*(canvas.height/rect.height)

let dx=x-CX
let dy=y-CY

let dist=Math.sqrt(dx*dx+dy*dy)

for(let i=0;i<3;i++){

let r=W*rings[i]
let rin=r-W*0.11

if(dist<r && dist>rin){

dragging=i
lastAngle=angle(x,y)

}

}

})



canvas.addEventListener("pointermove",e=>{

if(dragging===null)return

const rect=canvas.getBoundingClientRect()

let x=(e.clientX-rect.left)*(canvas.width/rect.width)
let y=(e.clientY-rect.top)*(canvas.height/rect.height)

let a=angle(x,y)

let da=a-lastAngle

ang[dragging]+=da

lastAngle=a

draw()

})



canvas.addEventListener("pointerup",()=>{

if(dragging!==null){

snap(dragging)
update()

}

dragging=null

})



function snap(d){

let step=Math.PI*2/9

ang[d]=Math.round(ang[d]/step)*step

draw()

}



function getIndex(a){

let step=Math.PI*2/9

let raw=(-a+Math.PI/2)%(Math.PI*2)

let i=Math.floor(raw/step)

return (i+9)%9

}



function update(){

let i0=getIndex(ang[0])
let i1=getIndex(ang[1])
let i2=getIndex(ang[2])

document.getElementById("letters").textContent=
letters[i0]+" · "+letters[i1]+" · "+letters[i2]

document.getElementById("phrase").innerHTML=

"<span>"+dignita[i0]+"</span> — "+
relazioni[i1]+" — "+
"<span>"+soggetti[i2]+"</span>"

}



update()
draw()

</script>

</body>
</html>
